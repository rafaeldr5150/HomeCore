services:
  db:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: YOUR_DB_ROOT_PASSWORD
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: YOUR_DB_PASSWORD
    volumes:
      - /mnt/hd/nextcloud/db:/var/lib/mysql

  nextcloud:
    image: nextcloud:latest
    restart: always
    ports:
      - "8084:80"
    depends_on:
      - db
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: YOUR_DB_PASSWORD
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: YOUR_ADMIN_PASSWORD
      NEXTCLOUD_DATA_DIR: /var/www/html/data
    volumes:
      - /mnt/hd/nextcloud/html:/var/www/html
      - /mnt/hd/nextcloud/data:/var/www/html/data
