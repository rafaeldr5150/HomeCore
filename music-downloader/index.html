<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Downloader</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; max-width: 750px; margin: 0 auto; padding: 24px 16px; background: #121212; color: white; min-height: 100vh; }
h1 { color: #1DB954; margin-bottom: 4px; font-size: 24px; }
.sub { color: #aaa; margin-bottom: 16px; font-size: 14px; }
input[type=text] { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: none; font-size: 15px; background: #282828; color: white; }
input[type=text]::placeholder { color: #666; }
.btn { padding: 14px; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; font-weight: bold; }
.btn-full { width: 100%; margin-top: 4px; }
.btn-green { background: #1DB954; color: white; }
.btn-green:disabled { background: #555; cursor: not-allowed; }
.btn-blue { background: #1a4a8a; color: white; font-size: 12px; padding: 7px 12px; border-radius: 8px; border: none; cursor: pointer; }
.btn-orange { background: #8a5a1a; color: white; font-size: 12px; padding: 7px 12px; border-radius: 8px; border: none; cursor: pointer; }
.btn-dl { background: #1DB954; color: white; font-size: 12px; padding: 7px 12px; border-radius: 8px; border: none; cursor: pointer; }
.job { margin-top: 16px; border-radius: 12px; background: #1a1a1a; overflow: hidden; }
.job-header { padding: 14px 16px; display: flex; align-items: center; gap: 10px; font-weight: bold; }
.running { background: #1a1a3a; border-left: 4px solid #4488ff; }
.done { background: #1a3a1a; border-left: 4px solid #1DB954; }
.error { background: #3a1a1a; border-left: 4px solid #ff4444; }
.job-url { font-size: 11px; color: #666; padding: 4px 16px 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.log { background: #0a0a0a; padding: 10px 16px; font-family: monospace; font-size: 12px; max-height: 200px; overflow-y: auto; }
.log-line { padding: 2px 0; border-bottom: 0.5px solid #111; line-height: 1.4; }
.success { color: #1DB954; }
.skip { color: #666; }
.info { color: #bbb; }
.err { color: #ff6666; }
.summary { padding: 14px 16px; }
.sum-ok { color: #1DB954; font-size: 13px; font-weight: bold; margin-bottom: 10px; }
.sum-err { color: #ff6666; font-size: 13px; font-weight: bold; margin-bottom: 10px; }
.err-item { background: #110808; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; border-left: 3px solid #ff4444; }
.err-title { font-size: 13px; color: #fff; font-weight: bold; margin-bottom: 4px; }
.err-name { font-size: 11px; color: #ff9999; margin-bottom: 8px; word-break: break-all; }
.err-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.link-box { margin-top: 8px; padding: 10px; background: #0f2a0f; border-radius: 8px; }
.link-box-label { font-size: 11px; color: #aaa; margin-bottom: 6px; }
.link-input { width: 100%; padding: 8px; background: #1a1a1a; color: white; border: 1px solid #333; border-radius: 6px; font-size: 12px; margin-bottom: 8px; }
.yt-results { margin-top: 10px; background: #0f0f0f; border-radius: 8px; padding: 8px; }
.yt-label { font-size: 11px; color: #888; margin-bottom: 6px; }
.yt-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 0.5px solid #222; }
.yt-item:last-child { border-bottom: none; }
.yt-info { flex: 1; overflow: hidden; }
.yt-title { font-size: 12px; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.yt-dur { font-size: 11px; color: #888; }
.badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; margin-left: auto; }
.badge-running { background: #1a2a5a; color: #88aaff; }
.badge-done { background: #1a3a1a; color: #1DB954; }
.badge-error { background: #3a1a1a; color: #ff6666; }
.spinner { display: inline-block; animation: spin 1s linear infinite; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.track-preview { background: #1a2a1a; border-radius: 10px; padding: 12px 16px; margin-top: 8px; border-left: 4px solid #1DB954; }
.track-preview-title { color: #1DB954; font-weight: bold; font-size: 13px; margin-bottom: 8px; }
.track-preview-list { font-size: 12px; color: #ccc; max-height: 150px; overflow-y: auto; margin-bottom: 12px; }
.track-preview-item { padding: 3px 0; border-bottom: 0.5px solid #2a3a2a; }
</style>
</head>
<body>
<h1>Music Downloader</h1>
<p class="sub">Paste a Spotify or YouTube link</p>
<input type="text" id="url" placeholder="https://open.spotify.com/... or https://youtube.com/...">
<button class="btn btn-green btn-full" id="btn" onclick="startDownload()">Download</button>
<div id="track-preview" style="display:none;"></div>
<div id="jobs"></div>
<script>
var activeJobs = {};
var pollInterval = null;
var pendingSpotifyTracks = null;

function isSpotify(url) { return url.indexOf('spotify.com') !== -1; }

function startDownload() {
    var url = document.getElementById('url').value.trim();
    if (!url) return;
    if (isSpotify(url)) startSpotifyDownload(url);
    else startYoutubeDownload(url);
}

function startYoutubeDownload(url) {
    document.getElementById('url').value = '';
    var btn = document.getElementById('btn');
    btn.disabled = true; btn.innerText = 'Starting...';
    fetch('/download', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url:url})})
    .then(function(r){ return r.json(); })
    .then(function(data){
        activeJobs[data.job_id] = {url:url, status:'running', lines:[], errors:[], success:[]};
        renderJobs();
        if (!pollInterval) pollInterval = setInterval(pollJobs, 2000);
    })
    .catch(function(e){ alert('Error: ' + e.message); })
    .finally(function(){ btn.disabled=false; btn.innerText='Download'; });
}

function startSpotifyDownload(url) {
    var btn = document.getElementById('btn');
    btn.disabled = true; btn.innerText = 'Fetching tracks...';
    document.getElementById('track-preview').style.display = 'none';

    fetch('/spotify-tracks', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url:url})})
    .then(function(r){ return r.json(); })
    .then(function(data) {
        if (data.error) { alert('Error: ' + data.error); return; }
        pendingSpotifyTracks = {tracks: data.tracks, url: url};
        showTrackPreview(data.tracks, url);
    })
    .catch(function(e){ alert('Error: ' + e.message); })
    .finally(function(){ btn.disabled=false; btn.innerText='Download'; });
}

function showTrackPreview(tracks, url) {
    var preview = document.getElementById('track-preview');
    var listHtml = tracks.map(function(t) {
        return '<div class="track-preview-item">' + t.artist + ' — ' + t.title + '</div>';
    }).join('');
    preview.innerHTML = '<div class="track-preview">' +
        '<div class="track-preview-title">&#9835; ' + tracks.length + ' tracks found</div>' +
        '<div class="track-preview-list">' + listHtml + '</div>' +
        '<button class="btn btn-green" style="width:100%;" onclick="confirmSpotifyDownload()">Download all</button>' +
        '</div>';
    preview.style.display = 'block';
}

function confirmSpotifyDownload() {
    if (!pendingSpotifyTracks) return;
    var tracks = pendingSpotifyTracks.tracks;
    var url = pendingSpotifyTracks.url;
    pendingSpotifyTracks = null;
    document.getElementById('track-preview').style.display = 'none';
    document.getElementById('url').value = '';

    fetch('/download-tracks', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tracks:tracks})})
    .then(function(r){ return r.json(); })
    .then(function(data) {
        activeJobs[data.job_id] = {url:url, status:'running', lines:[], errors:[], success:[]};
        renderJobs();
        if (!pollInterval) pollInterval = setInterval(pollJobs, 2000);
    })
    .catch(function(e){ alert('Error: ' + e.message); });
}

function pollJobs() {
    var ids = Object.keys(activeJobs);
    var promises = ids.map(function(id){
        if (activeJobs[id].status !== 'running') return Promise.resolve();
        return fetch('/status/'+id).then(function(r){ return r.json(); }).then(function(data){
            activeJobs[id].status = data.status;
            activeJobs[id].lines = data.lines||[];
            activeJobs[id].errors = data.errors||[];
            activeJobs[id].success = data.success||[];
        });
    });
    Promise.all(promises).then(function(){
        renderJobs();
        var still = Object.values(activeJobs).some(function(j){ return j.status==='running'; });
        if (!still){ clearInterval(pollInterval); pollInterval=null; }
    });
}

function searchYoutube(jobId, idx, name) {
    var btn = document.getElementById('sbtn-'+jobId+'-'+idx);
    if (btn){ btn.disabled=true; btn.innerText='Searching...'; }
    fetch('/search', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:name, limit:3})})
    .then(function(r){ return r.json(); })
    .then(function(data){ activeJobs[jobId].errors[idx].searchResults = data.results; renderJobs(); });
}

function downloadCustomLink(jobId, idx) {
    var input = document.getElementById('custom-link-'+jobId+'-'+idx);
    if (input && input.value.trim()) {
        document.getElementById('url').value = input.value.trim();
        startDownload();
    }
}

function renderJobs() {
    var container = document.getElementById('jobs');
    container.innerHTML = '';
    var ids = Object.keys(activeJobs);
    for (var k=0; k<ids.length; k++) {
        var id = ids[k];
        var job = activeJobs[id];
        var icon = job.status==='running' ? '<span class="spinner">o</span>' : job.status==='done' ? 'OK' : 'ERR';
        var label = job.status==='running' ? 'Downloading...' : job.status==='done' ? 'Done!' : 'Errors';
        var logHtml = '';
        for (var i=0; i<job.lines.length; i++) {
            var l = job.lines[i];
            var cls = l.type==='error' ? 'err' : (l.type||'info');
            logHtml += '<div class="log-line '+cls+'">'+l.text+'</div>';
        }
        var summaryHtml = '';
        if (job.status !== 'running') {
            summaryHtml = '<div class="summary">';
            if (job.success.length > 0)
                summaryHtml += '<div class="sum-ok">OK: '+job.success.length+' track(s) downloaded</div>';
            if (job.errors.length > 0) {
                summaryHtml += '<div class="sum-err">ERROR: '+job.errors.length+' track(s) failed:</div>';
                for (var j=0; j<job.errors.length; j++) {
                    var err = job.errors[j];
                    var displayName = err.name || err.line || 'Failed track';
                    var originalLink = err.youtube_url || '';
                    var linkBoxHtml = '<div class="link-box">' +
                        '<div class="link-box-label">Suggested link (editable):</div>' +
                        '<input type="text" class="link-input" id="custom-link-'+id+'-'+j+'" value="'+originalLink+'">' +
                        '<button class="btn-dl" onclick="downloadCustomLink(\''+id+'\','+j+')">Download this link</button>' +
                        '</div>';
                    var searchRes = '';
                    if (err.searchResults && err.searchResults.length > 0) {
                        searchRes = '<div class="yt-results"><div class="yt-label">YouTube suggestions:</div>';
                        for (var rr=0; rr<err.searchResults.length; rr++) {
                            var res = err.searchResults[rr];
                            var safeUrl = res.url.replace(/'/g, '');
                            searchRes += '<div class="yt-item"><div class="yt-info"><div class="yt-title">'+res.title+'</div><div class="yt-dur">'+res.duration+'</div></div><button class="btn-dl" onclick="document.getElementById(\'url\').value=\''+safeUrl+'\';startDownload()">Download</button></div>';
                        }
                        searchRes += '</div>';
                    }
                    summaryHtml += '<div class="err-item">' +
                        '<div class="err-title">'+displayName+'</div>' +
                        '<div class="err-name">'+err.line+'</div>' +
                        '<div class="err-actions">' +
                        '<button class="btn-blue" id="sbtn-'+id+'-'+j+'" onclick="searchYoutube(\''+id+'\','+j+',\''+displayName.replace(/'/g,'')+'\')">Search YouTube</button>' +
                        '<a href="https://www.youtube.com/results?search_query='+encodeURIComponent(displayName)+'" target="_blank"><button class="btn-orange">Open YouTube</button></a>' +
                        '</div>'+linkBoxHtml+searchRes+'</div>';
                }
            }
            summaryHtml += '</div>';
        }
        var div = document.createElement('div');
        div.className = 'job';
        div.innerHTML =
            '<div class="job-header '+job.status+'">'+icon+' '+label+'<span class="badge badge-'+job.status+'">'+job.status+'</span></div>' +
            '<div class="job-url">'+job.url+'</div>' +
            '<div class="log" id="log-'+id+'">'+logHtml+'</div>' +
            summaryHtml;
        container.appendChild(div);
        var log = document.getElementById('log-'+id);
        if (log) log.scrollTop = log.scrollHeight;
    }
}
</script>
</body>
</html>
